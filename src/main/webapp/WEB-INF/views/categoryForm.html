<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>카테고리 등록</title>
</head>
<body>
<h1>카테고리 등록</h1>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
  <input type="text" th:field="*{name}" placeholder="카테고리 이름"/>
  <span th:errors="*{name}" style="color:red"></span>
  <button type="submit">등록</button>
</form>

<a th:href="@{/categories}">목록으로</a>

<footer style="margin-top:30px; padding:10px; border-top:1px solid #ccc;">
  <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2371472 | 성명: 김도희'}"></p>
</footer>
</body>
</html>
