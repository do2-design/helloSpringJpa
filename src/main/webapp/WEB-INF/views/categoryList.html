<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>카테고리 목록</title>
</head>
<body>
<h1>카테고리 목록</h1>

<p th:if="${successMessage}" th:text="${successMessage}" style="color:green"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}" style="color:red"></p>

<a th:href="@{/categories/create}">새 카테고리 등록</a>

<table border="1">
  <thead>
  <tr>
    <th>ID</th>
    <th>카테고리명</th>
    <th>작업</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="cat : ${categories}">
    <td th:text="${cat.id}"></td>
    <td th:text="${cat.name}"></td>
    <td>
      <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
        <button type="submit">삭제</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>

<footer style="margin-top:30px; padding:10px; border-top:1px solid #ccc;">
  <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2371472 | 성명: 김도희'}"></p>
</footer>
</body>
</html>
